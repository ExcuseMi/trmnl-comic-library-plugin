strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: "https://raw.githubusercontent.com/ExcuseMi/trmnl-comic-library-plugin/refs/heads/main/data/comic_parser_data.json\r\n{% unless trmnl.user.id == 0 %}\r\n  {% assign cleaned_comics = comics\r\n    | replace: '[', ''\r\n    | replace: ']', ''\r\n    | replace: '\"', ''\r\n    | replace: ' ', '' %}\r\n  {% assign cleaned_comics_other_languages = comics_other_languages\r\n    | replace: '[', ''\r\n    | replace: ']', ''\r\n    | replace: '\"', ''\r\n    | replace: ' ', '' %}\r\n  {% assign cleaned_political = comics_political\r\n    | replace: '[', ''\r\n    | replace: ']', ''\r\n    | replace: '\"', ''\r\n    | replace: ' ', '' %}\r\n  {% assign merged_string = \"\" %}\r\n  {% if cleaned_comics != \"\" %}\r\n    {% assign merged_string = cleaned_comics %}\r\n  {% endif %}\r\n  {% if cleaned_comics_other_languages != \"\" %}\r\n    {% if merged_string != \"\" %}\r\n      {% assign merged_string = merged_string | append: \",\" | append: cleaned_comics_other_languages %}\r\n    {%\
  \ else %}\r\n      {% assign merged_string = cleaned_comics_other_languages %}\r\n    {% endif %}\r\n  {% endif %}\r\n  {% if cleaned_political != \"\" %}\r\n    {% if merged_string != \"\" %}\r\n      {% assign merged_string = merged_string | append: \",\" | append: cleaned_political %}\r\n    {% else %}\r\n      {% assign merged_string = cleaned_political %}\r\n    {% endif %}\r\n  {% endif %}\r\n  {% if extra_rss_feeds != \"\" %}\r\n    {% if merged_string != \"\" %}\r\n      {% assign merged_string = merged_string | append: \",\" | append: extra_rss_feeds %}\r\n    {% else %}\r\n      {% assign merged_string = extra_rss_feeds %}\r\n    {% endif %}\r\n  {% endif %}\r\n  {% assign merged_list = merged_string | split: \",\" %}\r\n  {% comment %}Fallback to demo data if no items selected{% endcomment %}\r\n  {% if merged_list.size > 0 and merged_list != empty %}\r\n    {% assign list_size = merged_list.size %}\r\n    {% assign seed = \"now\" | date: \"%s\" | plus: 0 %}\r\n    {% comment\
  \ %}Output 5 random feeds, cycling through the list{% endcomment %}\r\n    {% for i in (0..9) %}\r\n      {% assign index = seed | plus: i | modulo: list_size %}\r\n      {% assign item_type = merged_list[index] %}\r\n      {% unless item_type contains \"http://\" or item_type contains \"https://\" %}\r\n        {% assign item_type = \"https://comiccaster.xyz/rss/\" | append: item_type %}\r\n      {% endunless %}\r\n{{ item_type }}\r\n    {% endfor %}\r\n  {% else %}\r\n    {% comment %}Fallback: repeat demo URL 5 times{% endcomment %}\r\n    {% for i in (0..4) %}\r\nhttps://excusemi.github.io/trmnl-comic-library-plugin/data/demo_data.atom\r\n    {% endfor %}\r\n  {% endif %}\r\n{% else %}\r\n  {% for i in (0..4) %}\r\nhttps://excusemi.github.io/trmnl-comic-library-plugin/data/demo_data.atom\r\n  {% endfor %}\r\n{% endunless %}"
polling_headers: ''
polling_body: ''
